version: "3.8"
services:
  cloudpilot:
    build: .
    ports:
      - "8080:8080"
    environment:
      - AWS_PROFILE=${AWS_PROFILE:-default}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - CLOUDPILOT_MODEL=${CLOUDPILOT_MODEL:-us.anthropic.claude-sonnet-4-20250514-v1:0}
      - CLOUDPILOT_BEDROCK_REGION=${CLOUDPILOT_BEDROCK_REGION:-us-east-1}
      - CLOUDPILOT_API_KEY=${CLOUDPILOT_API_KEY:-}
      - CLOUDPILOT_CORS_ORIGINS=${CLOUDPILOT_CORS_ORIGINS:-*}
    volumes:
      - ~/.aws:/root/.aws:ro  # Mount AWS credentials (read-only)
